<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Мой AI Ассистент</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 100%;
            max-height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .chat-header {
            background: #007aff;
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .chat-header h2 {
            font-size: 20px;
            font-weight: 600;
        }
        
        .chat-header p {
            font-size: 14px;
            opacity: 0.9;
            margin-top: 5px;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .message {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 20px;
            word-wrap: break-word;
        }
        
        .user-message {
            background: #007aff;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 5px;
        }
        
        .bot-message {
            background: #e9e9e9;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 5px;
        }
        
        .typing-indicator {
            background: #e9e9e9;
            color: #666;
            align-self: flex-start;
            padding: 10px 15px;
            border-radius: 20px;
            font-style: italic;
        }
        
        .input-area {
            display: flex;
            gap: 10px;
            padding: 20px;
            border-top: 1px solid #e9e9e9;
            background: white;
        }
        
        .input-area input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 25px;
            font-size: 16px;
            font-family: inherit;
            outline: none;
        }
        
        .input-area input:focus {
            border-color: #007aff;
        }
        
        .input-area button {
            background: #007aff;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .input-area button:hover {
            background: #005bbf;
        }
        
        .input-area button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        @media (max-width: 600px) {
            .chat-container {
                max-height: 100vh;
                border-radius: 0;
            }
            
            .message {
                max-width: 90%;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h2>🤖 Мой AI Ассистент</h2>
            <p>Напишите что-нибудь...</p>
        </div>
        
        <div class="chat-messages" id="messages">
            <div class="message bot-message">👋 Привет! Я ваш AI-ассистент. Чем могу помочь?</div>
        </div>
        
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Напишите сообщение..." autofocus>
            <button id="sendButton" onclick="sendMessage()">Отправить</button>
        </div>
    </div>

    <script>
        // Генерируем ID сессии (чтобы AI помнил диалог в рамках сессии)
        let sessionId = localStorage.getItem('sessionId');
        if (!sessionId) {
            sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('sessionId', sessionId);
        }
        
        // ⚠️ ВАЖНО: ЗАМЕНИТЕ ЭТУ СТРОКУ НА ВАШ WEBHOOK URL ⚠️
        const WEBHOOK_URL = 'https://vlek.app.n8n.cloud/webhook/assistant';
        
        const messagesContainer = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        
        function addMessage(text, isUser) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
            messageDiv.textContent = text;
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
        
        function showTypingIndicator() {
            const indicator = document.createElement('div');
            indicator.className = 'typing-indicator';
            indicator.id = 'typing-indicator';
            indicator.textContent = '✍️ Печатает...';
            messagesContainer.appendChild(indicator);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
        
        function removeTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) {
                indicator.remove();
            }
        }
        
        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;
            
            // Очищаем поле и отключаем кнопку
            messageInput.value = '';
            sendButton.disabled = true;
            
            // Показываем сообщение пользователя
            addMessage(text, true);
            
            // Показываем индикатор печати
            showTypingIndicator();
            
            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        text: text,
                        sessionId: sessionId
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const reply = await response.text();
                removeTypingIndicator();
                addMessage(reply || '😕 Не удалось получить ответ', false);
            } catch (error) {
                console.error('Error:', error);
                removeTypingIndicator();
                addMessage(`❌ Ошибка: ${error.message}`, false);
            } finally {
                sendButton.disabled = false;
                messageInput.focus();
            }
        }
        
        // Отправка по Enter
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !sendButton.disabled) {
                sendMessage();
            }
        });
    </script>
</body>
</html>
