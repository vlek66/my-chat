<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    
    html, body {
        height: 100%;
        overflow: hidden;
    }
    
    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f5f5f5;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    
    .chat-container {
        width: 100%;
        max-width: 800px;
        height: 100vh;
        max-height: 100vh;
        background: white;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }
    
    .chat-header {
        background: #007aff;
        color: white;
        padding: 20px;
        padding-top: max(20px, env(safe-area-inset-top));
        text-align: center;
        flex-shrink: 0;
    }
    
    .chat-header h2 {
        font-size: 20px;
        font-weight: 600;
    }
    
    .chat-header p {
        font-size: 14px;
        opacity: 0.9;
        margin-top: 5px;
    }
    
    .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        padding-bottom: calc(20px + env(safe-area-inset-bottom, 0px));
        display: flex;
        flex-direction: column;
        gap: 10px;
    }
    
    .message {
        max-width: 80%;
        padding: 10px 15px;
        border-radius: 20px;
        word-wrap: break-word;
    }
    
    .user-message {
        background: #007aff;
        color: white;
        align-self: flex-end;
        border-bottom-right-radius: 5px;
    }
    
    .bot-message {
        background: #e9e9e9;
        color: #333;
        align-self: flex-start;
        border-bottom-left-radius: 5px;
    }
    
    .typing-indicator {
        background: #e9e9e9;
        color: #666;
        align-self: flex-start;
        padding: 10px 15px;
        border-radius: 20px;
        font-style: italic;
    }
    
    .input-area {
        display: flex;
        gap: 10px;
        padding: 20px;
        padding-bottom: calc(20px + env(safe-area-inset-bottom, 0px));
        border-top: 1px solid #e9e9e9;
        background: white;
        flex-shrink: 0;
    }
    
    .input-area input {
        flex: 1;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 25px;
        font-size: 16px;
        font-family: inherit;
        outline: none;
    }
    
    .input-area input:focus {
        border-color: #007aff;
    }
    
    .input-area button {
        background: #007aff;
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: 25px;
        font-size: 16px;
        cursor: pointer;
        transition: background 0.2s;
    }
    
    .input-area button:hover {
        background: #005bbf;
    }
    
    .input-area button:disabled {
        background: #ccc;
        cursor: not-allowed;
    }
</style>
